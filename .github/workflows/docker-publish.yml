name: docker-publish

# ============================================================
# 将 law-firm-website 构建为两个镜像并推送至 GitHub Container Registry (GHCR)
# - ghcr.io/${{ github.repository_owner }}/lawfirm-frontend:<tag>
# - ghcr.io/${{ github.repository_owner }}/lawfirm-backend:<tag>
# Tag 策略：sha-<7位> / latest（仅 main 分支）/ 语义化版本（vX.Y.Z tag 触发时）
# 平台：linux/amd64 + linux/arm64（ECS 通常 amd64，arm64 备用）
# ============================================================

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Push latest tag (PR/手动触发时默认 false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/lawfirm-frontend
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/lawfirm-backend

permissions:
  contents: read
  packages: write
  id-token: write   # 预留：若以后要加 cosign 签名

jobs:
  build-and-push:
    name: build · ${{ matrix.target.name }} · ${{ matrix.image }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            dockerfile: docker/frontend.Dockerfile
            context: .
          - image: backend
            dockerfile: docker/backend.Dockerfile
            context: .
      # 同 matrix 任务并发（前端/后端 x amd64/arm64 = 4 个并行 job）

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 拿全部历史，方便 tag/sha 计算

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.BACKEND_IMAGE }}
          # 只对当前 matrix 里那个 image 输出 tag
          flavor: |
            latest=${{ matrix.image == 'frontend' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || inputs.push_latest == 'true') && 'true' || 'false' }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          bake-target: ${{ matrix.image }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA 内置缓存：按 image 分桶，避免前后端互相污染
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true

      # ===== 调试补丁：buildx 日志只显示 139 行容易丢信息 =====
      # 失败时把 buildkit 完整日志以 artifact 形式上传，方便排查
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.image }}-${{ matrix.target.name }}
          path: |
            ${{ runner.temp }}/buildkit-*.log
            .next-build-error.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Image digest (PR 评论用)
        id: digest
        if: github.event_name != 'pull_request'
        run: |
          digest=$(docker buildx imagetools inspect \
            ${{ matrix.image == 'frontend' && env.FRONTEND_IMAGE || env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }} \
            --raw | jq -r .digest 2>/dev/null || echo 'unavailable')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          echo "## 🐳 ${{ matrix.image }} image" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref**:   ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**:   ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**:  \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.digest.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------
  # 可选 Job：扫镜像漏洞（不需要 Trivy 高级功能时可以直接用官方 action）
  # 默认不启用，节省 CI 时间；如需开启把 if 去掉即可
  # ---------------------------------------------------------------
  scan:
    name: scan · ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: build-and-push
    if: false   # ← 默认关闭，删掉这行即开启
    strategy:
      fail-fast: false
      matrix:
        image: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/lawfirm-${{ matrix.image }}:sha-${{ steps.meta.outputs.short_sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH